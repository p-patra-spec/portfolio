<!DOCTYPE html>
<html>
<head>
    <title>FEST REGISTRATION</title>
    
</head>

<body>

<h1><u><i>COLLEGE FEST</i></u></h1>
<h2><u><i>REGISTRATION FORM</i></u></h2>

<form action="formality.php" method="POST">


<fieldset>
<legend>BASIC DATA</legend>

Student Name:
<input type="text" name="student_name" placeholder="Enter Full Name" required><br><br>

Roll No:
<input type="number" name="roll_no" placeholder="Enter Roll No" required><br><br>

Stream:
<select name="stream" required>
    <option value="">---Select---</option>
    <option value="Science">Science</option>
    <option value="Commerce">Commerce</option>
    <option value="Arts">Arts</option>
</select><br><br>

Phone No:
<input type="text" name="phone_no" placeholder="Enter Phone No" required ><br><br>

Email ID:
<input type="email" name="email" placeholder="Enter Email-ID" required><br><br>

Food Preference:
<input type="radio" name="food_preference" value="Non-Veg" required> Non-Veg
<input type="radio" name="food_preference" value="Veg"> Veg<br><br>

Participation Category:
<select name="participation_category" required>
    <option value="Dance">Dance</option>
    <option value="Singing">Singing</option>
    <option value="Drama">Drama</option>
    <option value="Recitation">Recitation</option>
</select><br><br>

<center>
<button type="submit" name="submit" >SUBMIT</button>
</center>

</fieldset>
</form>

<style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Allows headings to stay above the form */
            justify-content: center;
            align-items: center;
            font-family: 'Times New Roman', Times, serif;
            background-color: #96d4f4;
        }
        fieldset {
            text-align: left; /* Changed to left for better readability */
            background-color: pink;
            border: thick solid black;
            padding: 20px;
        }               
        button {
            background-color: red;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .center-text {
            text-align: center;
        }
    </style>
</body>
</html>
