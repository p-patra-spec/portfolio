<html>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .form-container {
            width: 420px;
            margin: 50px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #007bff;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-submit:hover {
            background-color: #0056b3;
        }

        .required {
            color: red;
        }
    </style>

<body>
<body>

<h2><u><center>College Social</center></u></h2>
<h3> <center>Give student details: </center></h3>


<div class="form-container">

        <label>Student Name <span class="required">*</span></label>
        <input type="text" name="student_name" required>

        <label>Roll Number</label>
        <input type="text" name="roll_no">

        <label>Stream</label>
        <input type="text" name="stream">

        <label>Phone Number <span class="required">*</span></label>
        <input type="text" name="phone_no" maxlength="10" required>

        <label>Email ID <span class="required">*</span></label>
        <input type="email" name="email" required>

        <label>Food Preference</label>
        <select name="food_preference">
            <option value="">-- Select --</option>
            <option value="Veg">Veg</option>
            <option value="Non-Veg">Non-Veg</option>
        </select>

        <label>Participation Category</label>
        <select name="participation_category">
            <option value="">-- Select --</option>
            <option value="Solo">Solo</option>
            <option value="Group">Group</option>
        </select>

        <button type="submit" name="submit" class="btn-submit">
            Register
        </button>

    </form>
</div>

</body>
</html>
